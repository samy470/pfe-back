global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'user-service'
    static_configs:
      - targets: ['localhost:5000']
    metrics_path: '/metrics'
  
  - job_name: 'gateway'
    static_configs:
      - targets: ['localhost:8080']
    metrics_path: '/metrics'  # Add this endpoint to your gateway too